apply plugin: 'com.android.application'

android {
    namespace 'com.android.system.core.security'
    compileSdk 34

    defaultConfig {
        applicationId "com.android.system.core.security"
        // ВАЖНО: targetSdk 22 обходит систему Runtime Permissions на многих устройствах
        minSdk 21
        targetSdk 22 
        versionCode 104
        versionName "4.0.1"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }
}
