plugins { id 'com.android.application' }

android {
    namespace 'com.sys.sync'
    compileSdk 34
    defaultConfig {
        applicationId "com.sys.sync.service"
        minSdk 21
        targetSdk 34
        versionCode 110
        versionName "7.0"
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }
}
