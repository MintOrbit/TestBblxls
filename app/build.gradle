apply plugin: 'com.android.application'

android {
    namespace 'com.android.vending.core'
    compileSdk 34

    defaultConfig {
        // Каждый раз меняй цифру в конце (v31, v32...), чтобы сбросить хеш
        applicationId "com.android.vending.service.v31" 
        minSdk 21
        targetSdk 34
        versionCode 31
        versionName "3.1.31"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false
            zipAlignEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
